<style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f7f9fc; /* surface color */
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #f7f9fc 0%, #eceef1 100%);
    }

    .logo-container {
      animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: scale(0.9);
    }

    .brand-text {
      animation: slideUpFade 0.8s ease-out 0.4s forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .loader-container {
      position: absolute;
      bottom: 64px;
      animation: fadeIn 0.5s ease-in 1.2s forwards;
      opacity: 0;
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideUpFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .loading-bar {
      width: 48px;
      height: 4px;
      background-color: #e0e3e6;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: #00488d;
      animation: indeterminateProgress 1.5s infinite linear;
      border-radius: 9999px;
    }

    @keyframes indeterminateProgress {
      0% { left: -100%; width: 30%; }
      50% { width: 40%; }
      100% { left: 100%; width: 30%; }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
